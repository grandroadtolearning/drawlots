<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>得勝者 ✦ 線上抽籤</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a14;
      --surface: #13131f;
      --border: #2a2a40;
      --gold: #f5c842;
      --gold-light: #ffe680;
      --silver: #c0c8d8;
      --bronze: #e8956a;
      --green: #5ce68a;
      --blue: #5bc8f5;
      --text: #f0f0ff;
      --muted: #7878a0;
      --red: #f56c6c;
    }

    html, body {
      min-height: 100%;
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .stars {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(91,200,245,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(245,200,66,0.05) 0%, transparent 50%);
    }
    .stars::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 70%, rgba(255,255,255,0.5) 0%, transparent 100%);
    }

    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 32px 16px 56px;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 28px; }
    .badge {
      display: inline-block;
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      color: var(--gold);
      border: 1px solid rgba(245,200,66,0.3);
      border-radius: 100px;
      padding: 4px 14px; margin-bottom: 12px;
    }
    .header h1 {
      font-size: clamp(26px, 6vw, 42px); font-weight: 900;
      background: linear-gradient(135deg, #fff 30%, var(--gold-light) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1.15;
    }
    .header p { margin-top: 10px; font-size: 14px; color: var(--muted); line-height: 1.6; }

    /* ── Serial input card ── */
    .serial-card {
      width: 100%; max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .serial-card label {
      display: block;
      font-size: 12px; font-weight: 700; letter-spacing: 1px;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 8px;
    }
    .serial-row { display: flex; gap: 8px; }
    .serial-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 15px; font-weight: 500;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 1px;
    }
    .serial-input:focus { border-color: rgba(91,200,245,0.5); }
    .serial-input::placeholder { color: var(--muted); font-size: 13px; letter-spacing: 0; }
    .serial-input.error { border-color: var(--red); }
    .serial-input.success { border-color: rgba(92,230,138,0.5); }

    .verify-btn {
      padding: 12px 18px;
      background: rgba(91,200,245,0.1);
      border: 1px solid rgba(91,200,245,0.3);
      border-radius: 10px;
      color: var(--blue);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px; font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .verify-btn:hover:not(:disabled) { background: rgba(91,200,245,0.18); }
    .verify-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .serial-msg {
      margin-top: 8px;
      font-size: 12px; line-height: 1.5;
      min-height: 18px;
    }
    .serial-msg.err { color: var(--red); }
    .serial-msg.ok { color: var(--green); }
    .serial-msg.info { color: var(--muted); }

    /* ── Prize list ── */
    .prizes {
      width: 100%; max-width: 420px;
      margin-bottom: 28px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .prize-row {
      display: flex; align-items: center; gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
    }
    .prize-row .emoji { font-size: 20px; flex-shrink: 0; }
    .prize-row .name { font-size: 13px; font-weight: 500; flex: 1; }
    .prize-row .tier {
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      padding: 2px 8px; border-radius: 6px; flex-shrink: 0;
    }
    .tier-grand     { background: rgba(245,200,66,0.15);  color: var(--gold);   border: 1px solid rgba(245,200,66,0.3); }
    .tier-first     { background: rgba(192,200,216,0.15); color: var(--silver); border: 1px solid rgba(192,200,216,0.3); }
    .tier-second    { background: rgba(232,149,106,0.15); color: var(--bronze); border: 1px solid rgba(232,149,106,0.3); }
    .tier-third     { background: rgba(91,200,245,0.15);  color: var(--blue);   border: 1px solid rgba(91,200,245,0.3); }
    .tier-consolation { background: rgba(92,230,138,0.12); color: var(--green); border: 1px solid rgba(92,230,138,0.25); }

    /* ── Drum ── */
    .drum-wrap {
      position: relative; width: 190px; height: 190px;
      margin-bottom: 28px;
    }
    .drum {
      width: 100%; height: 100%; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #2a2a50, #0d0d24);
      border: 3px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 6px rgba(91,200,245,0.04), 0 0 40px rgba(91,200,245,0.08), inset 0 2px 20px rgba(255,255,255,0.04);
    }
    .drum-inner {
      width: 132px; height: 132px; border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #1e1e38, #090918);
      border: 2px solid rgba(91,200,245,0.15);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 4px;
    }
    .drum-label { font-size: 30px; line-height: 1; }
    .drum-text { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--muted); }
    .scroll-prize { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: var(--gold); opacity: 0; height: 14px; text-align: center; transition: opacity 0.2s; }

    .orbit {
      position: absolute; inset: -12px; border-radius: 50%;
      border: 1px dashed rgba(91,200,245,0.15);
    }
    .orbit-dot {
      position: absolute; width: 8px; height: 8px; border-radius: 50%;
      background: var(--blue); top: -4px; left: calc(50% - 4px);
      box-shadow: 0 0 8px var(--blue);
    }

    @keyframes shake {
      0%,100% { transform: rotate(0deg) scale(1); }
      10% { transform: rotate(-6deg) scale(1.02); }
      20% { transform: rotate(6deg) scale(1.02); }
      30% { transform: rotate(-8deg) scale(1.04); }
      40% { transform: rotate(8deg) scale(1.04); }
      50% { transform: rotate(-5deg) scale(1.03); }
      60% { transform: rotate(5deg) scale(1.03); }
      70% { transform: rotate(-7deg) scale(1.02); }
      80% { transform: rotate(7deg) scale(1.02); }
      90% { transform: rotate(-3deg) scale(1.01); }
    }
    @keyframes orbit-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse-glow {
      0%,100% { box-shadow: 0 0 0 6px rgba(91,200,245,0.04), 0 0 40px rgba(91,200,245,0.08), inset 0 2px 20px rgba(255,255,255,0.04); }
      50% { box-shadow: 0 0 0 10px rgba(91,200,245,0.08), 0 0 60px rgba(91,200,245,0.2), inset 0 2px 20px rgba(255,255,255,0.06); }
    }

    .drum-wrap.shaking .drum { animation: shake 0.12s infinite linear; box-shadow: 0 0 0 10px rgba(245,200,66,0.08), 0 0 60px rgba(245,200,66,0.2), inset 0 2px 20px rgba(255,255,255,0.06); }
    .drum-wrap.shaking .orbit { animation: orbit-spin 0.4s linear infinite; }
    .drum-wrap.shaking .scroll-prize { opacity: 1; }
    .drum-wrap:not(.shaking) .drum { animation: pulse-glow 3s ease-in-out infinite; }

    /* ── Draw button ── */
    .draw-btn {
      width: 100%; max-width: 320px;
      padding: 16px 32px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 17px; font-weight: 700; letter-spacing: 2px;
      color: var(--bg);
      background: linear-gradient(135deg, var(--gold) 0%, #ffb700 100%);
      border: none; border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(245,200,66,0.35);
      transition: all 0.2s;
      position: relative; overflow: hidden;
    }
    .draw-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(245,200,66,0.45); }
    .draw-btn:active:not(:disabled) { transform: translateY(0); }
    .draw-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .draw-btn .shine {
      position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: skewX(-15deg); transition: left 0.5s;
    }
    .draw-btn:hover:not(:disabled) .shine { left: 150%; }

    /* ── Already drawn notice ── */
    .already-notice {
      display: none;
      width: 100%; max-width: 420px;
      margin-bottom: 20px;
      background: rgba(92,230,138,0.08);
      border: 1px solid rgba(92,230,138,0.25);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px; color: var(--green);
      text-align: center; line-height: 1.6;
    }

    /* ── Result overlay ── */
    .result-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(5,5,15,0.92);
      align-items: center; justify-content: center;
      padding: 24px; backdrop-filter: blur(8px);
    }
    .result-overlay.show { display: flex; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .result-card {
      width: 100%; max-width: 380px;
      background: var(--surface); border-radius: 24px;
      padding: 36px 28px 28px; text-align: center;
      position: relative;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
      border: 1px solid var(--border);
    }
    @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .close-btn {
      position: absolute; top: 16px; right: 16px;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--muted); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .close-btn:hover { background: rgba(255,255,255,0.12); }

    .result-emoji { font-size: 54px; margin-bottom: 12px; }
    .result-tier { display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: 2px; padding: 4px 14px; border-radius: 100px; margin-bottom: 14px; }
    .result-name { font-size: 20px; font-weight: 700; line-height: 1.4; margin-bottom: 12px; }

    .result-serial-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 12px; color: var(--muted);
      line-height: 1.6;
    }
    .result-serial-box strong { color: var(--blue); font-size: 15px; letter-spacing: 2px; }

    .result-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 20px; }

    .screenshot-hint {
      background: rgba(245,200,66,0.08); border: 1px solid rgba(245,200,66,0.25);
      border-radius: 10px; padding: 10px 14px;
      font-size: 12px; color: var(--gold); line-height: 1.6;
      margin-bottom: 20px;
    }

    .result-action {
      width: 100%; padding: 13px; border-radius: 12px;
      border: 1px solid rgba(91,200,245,0.3);
      background: rgba(91,200,245,0.06);
      color: var(--blue);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
    }
    .result-action:hover { background: rgba(91,200,245,0.12); }

    /* ── Confetti ── */
    .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 200; overflow: hidden; }
    .confetti-piece {
      position: absolute; border-radius: 2px;
      opacity: 0; animation: fall linear forwards;
    }
    @keyframes fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .footer { margin-top: 36px; text-align: center; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
<div class="stars"></div>
<div class="confetti-wrap" id="confettiWrap"></div>

<div class="page">

  <div class="header">
    <div class="badge">得勝者升學計畫</div>
    <h1>線上抽籤</h1>
    <p>輸入你的抽獎序號，每個序號限抽一次 🎯</p>
  </div>

  <!-- Serial number input -->
  <div class="serial-card">
    <label>抽獎序號</label>
    <div class="serial-row">
      <input
        class="serial-input"
        id="serialInput"
        type="text"
        placeholder="輸入你在落點查詢時取得的序號"
        autocomplete="off"
        autocapitalize="characters"
        spellcheck="false"
      />
      <button class="verify-btn" id="verifyBtn" onclick="verifySerial()">確認</button>
    </div>
    <div class="serial-msg info" id="serialMsg">請輸入序號後按確認</div>
  </div>

  <!-- Already drawn notice -->
  <div class="already-notice" id="alreadyNotice"></div>

  <!-- Prize list -->
  <div class="prizes">
    <div class="prize-row"><span class="emoji">🎬</span><div class="name">威秀影城電影票</div><span class="tier tier-grand">特獎</span></div>
    <div class="prize-row"><span class="emoji">☕</span><div class="name">星巴克 100元兌換券</div><span class="tier tier-first">一獎</span></div>
    <div class="prize-row"><span class="emoji">📋</span><div class="name">115學測完整歷屆試題</div><span class="tier tier-second">二獎</span></div>
    <div class="prize-row"><span class="emoji">📖</span><div class="name">得勝者申請寶典</div><span class="tier tier-third">三獎</span></div>
    <div class="prize-row"><span class="emoji">🏫</span><div class="name">免費自習空間 3 天（含輔導老師）</div><span class="tier tier-consolation">參加獎</span></div>
  </div>

  <!-- Drum -->
  <div class="drum-wrap" id="drumWrap">
    <div class="drum">
      <div class="orbit"><div class="orbit-dot"></div></div>
      <div class="drum-inner">
        <div class="drum-label">🎱</div>
        <div class="drum-text">DRAW</div>
        <div class="scroll-prize" id="scrollPrize">—</div>
      </div>
    </div>
  </div>

  <button class="draw-btn" id="drawBtn" disabled onclick="startDraw()">
    <span class="shine"></span>
    ✨ 立即抽籤
  </button>

  <div class="footer">得勝者教育 &copy; 2025 · 每個序號限抽一次</div>
</div>

<!-- Result overlay -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <button class="close-btn" onclick="closeResult()">✕</button>
    <div class="result-emoji" id="resEmoji"></div>
    <div class="result-tier" id="resTier"></div>
    <div class="result-name" id="resName"></div>
    <div class="result-serial-box">
      抽獎序號：<strong id="resSerial"></strong>
    </div>
    <div class="result-desc" id="resDesc"></div>
    <div class="screenshot-hint">📸 請截圖保存此畫面，憑序號 + 截圖向得勝者老師領取獎品</div>
    <button class="result-action" onclick="closeResult()">好的，我已截圖了 👏</button>
  </div>
</div>

<script>
  // ── Supabase config ──
  const SUPABASE_URL = 'https://reebwzixfrwgukiemcgn.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJlZWJ3eml4ZnJ3Z3VraWVtY2duIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjkyNzQsImV4cCI6MjA5MDMwNTI3NH0.Xil4Me9L6grtqBCuU6hbPHEQlRSENJcayCXz0v8Ik5M';

  async function dbFetch(path, opts = {}) {
    const res = await fetch(SUPABASE_URL + path, {
      ...opts,
      headers: {
        'apikey': SUPABASE_ANON,
        'Authorization': 'Bearer ' + SUPABASE_ANON,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation',
        ...(opts.headers || {}),
      },
    });
    const text = await res.text();
    return { ok: res.ok, status: res.status, data: text ? JSON.parse(text) : null };
  }

  // ── Prizes ──
  const PRIZES = [
    { id: 'grand',       emoji: '🎬', tier: '特獎',  tierClass: 'tier-grand',       name: '威秀影城電影票',          weight: 1,  colors: ['#f5c842','#ffe680','#fff'], count: 120, desc: '恭喜你抽到特獎！憑序號截圖向得勝者老師領取威秀影城電影票一張 🎉' },
    { id: 'first',       emoji: '☕', tier: '一獎',  tierClass: 'tier-first',       name: '星巴克 100元兌換券',       weight: 2,  colors: ['#c0c8d8','#fff','#aab4cc'], count: 90,  desc: '恭喜你抽到一獎！憑序號截圖向得勝者老師領取星巴克 100元兌換券一張 ☕' },
    { id: 'second',      emoji: '📋', tier: '二獎',  tierClass: 'tier-second',      name: '115學測完整歷屆試題',      weight: 10, colors: ['#e8956a','#ffcba4','#fff'], count: 70,  desc: '恭喜你抽到二獎！憑序號截圖向得勝者老師領取115學測完整歷屆試題一份 📋' },
    { id: 'third',       emoji: '📖', tier: '三獎',  tierClass: 'tier-third',       name: '得勝者申請寶典',           weight: 20, colors: ['#5bc8f5','#a0e0ff','#fff'], count: 55,  desc: '恭喜你抽到三獎！憑序號截圖向得勝者老師領取《得勝者申請寶典》一本 📖' },
    { id: 'consolation', emoji: '🏫', tier: '參加獎', tierClass: 'tier-consolation', name: '免費自習空間 3 天',         weight: 30, colors: ['#5ce68a','#a0f5bc','#fff'], count: 45,  desc: '恭喜你抽到參加獎！憑序號截圖向得勝者老師領取免費自習空間使用權 3 天 🏫（現場有輔導老師可問問題）' },
  ];

  const tierStyles = {
    'tier-grand':       'background:rgba(245,200,66,0.15);color:#f5c842;border:1px solid rgba(245,200,66,0.3)',
    'tier-first':       'background:rgba(192,200,216,0.15);color:#c0c8d8;border:1px solid rgba(192,200,216,0.3)',
    'tier-second':      'background:rgba(232,149,106,0.15);color:#e8956a;border:1px solid rgba(232,149,106,0.3)',
    'tier-third':       'background:rgba(91,200,245,0.15);color:#5bc8f5;border:1px solid rgba(91,200,245,0.3)',
    'tier-consolation': 'background:rgba(92,230,138,0.12);color:#5ce68a;border:1px solid rgba(92,230,138,0.25)',
  };

  function pickPrize() {
    const total = PRIZES.reduce((s, p) => s + p.weight, 0);
    let r = Math.random() * total;
    for (const p of PRIZES) { r -= p.weight; if (r <= 0) return p; }
    return PRIZES[PRIZES.length - 1];
  }

  // ── State ──
  let verifiedSerial = null;

  // ── Serial verification ──
  async function verifySerial() {
    const raw = document.getElementById('serialInput').value.trim().toUpperCase();
    if (!raw) { setMsg('err', '請先輸入序號'); return; }

    const input = document.getElementById('serialInput');
    const btn   = document.getElementById('verifyBtn');
    btn.disabled = true;
    btn.textContent = '查詢中…';
    setMsg('info', '正在確認序號…');
    input.className = 'serial-input';

    try {
      const { ok, data } = await dbFetch(
        `/rest/v1/draw_records?serial_number=eq.${encodeURIComponent(raw)}&select=serial_number,prize_name,prize_tier,prize_emoji,prize_id`
      );

      if (!ok) throw new Error('查詢失敗');

      if (data && data.length > 0) {
        // Already drawn
        const rec = data[0];
        input.className = 'serial-input success';
        setMsg('ok', `✅ 查到了！此序號已抽過籤`);
        showAlreadyDrawn(rec);
        btn.textContent = '已確認';
      } else {
        // Valid, not yet drawn
        verifiedSerial = raw;
        input.className = 'serial-input success';
        setMsg('ok', `✅ 序號確認成功！可以抽籤了`);
        document.getElementById('drawBtn').disabled = false;
        btn.textContent = '已確認';
        hideAlreadyDrawn();
      }
    } catch (e) {
      input.className = 'serial-input error';
      setMsg('err', '網路錯誤，請稍後再試');
      btn.disabled = false;
      btn.textContent = '確認';
    }
  }

  function setMsg(type, text) {
    const el = document.getElementById('serialMsg');
    el.className = 'serial-msg ' + (type === 'err' ? 'err' : type === 'ok' ? 'ok' : 'info');
    el.textContent = text;
  }

  function showAlreadyDrawn(rec) {
    const el = document.getElementById('alreadyNotice');
    el.style.display = 'block';
    el.innerHTML = `✅ 序號 <strong style="color:#5bc8f5;letter-spacing:1px">${rec.serial_number}</strong> 已經抽過了<br>你抽到的是 ${rec.prize_emoji} <strong>${rec.prize_name}</strong>（${rec.prize_tier}）`;
    document.getElementById('drawBtn').disabled = true;
  }
  function hideAlreadyDrawn() {
    document.getElementById('alreadyNotice').style.display = 'none';
  }

  // ── Scroll animation ──
  const allNames = PRIZES.map(p => p.name);
  let scrollInterval = null, si = 0;
  function startScroll() {
    si = Math.floor(Math.random() * allNames.length);
    scrollInterval = setInterval(() => {
      si = (si + 1) % allNames.length;
      document.getElementById('scrollPrize').textContent = allNames[si];
    }, 110);
  }
  function stopScroll() { clearInterval(scrollInterval); scrollInterval = null; }

  // ── Confetti ──
  function launchConfetti(colors, count) {
    const wrap = document.getElementById('confettiWrap');
    wrap.innerHTML = '';
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colors[i%colors.length]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.6}s`;
      wrap.appendChild(el);
    }
    setTimeout(() => { wrap.innerHTML = ''; }, 3500);
  }

  // ── Show result ──
  function showResult(prize, serial) {
    document.getElementById('resEmoji').textContent = prize.emoji;
    const tierEl = document.getElementById('resTier');
    tierEl.textContent = prize.tier;
    tierEl.style.cssText = tierStyles[prize.tierClass] || '';
    document.getElementById('resName').textContent = prize.name;
    document.getElementById('resSerial').textContent = serial;
    document.getElementById('resDesc').textContent = prize.desc;
    document.getElementById('resultOverlay').classList.add('show');
    launchConfetti(prize.colors, prize.count);
  }
  function closeResult() { document.getElementById('resultOverlay').classList.remove('show'); }

  // ── Main draw ──
  async function startDraw() {
    if (!verifiedSerial) return;

    const btn      = document.getElementById('drawBtn');
    const drumWrap = document.getElementById('drumWrap');
    btn.disabled = true;
    document.getElementById('verifyBtn').disabled = true;

    drumWrap.classList.add('shaking');
    startScroll();

    const shakeDuration = 2200 + Math.random() * 800;

    setTimeout(async () => {
      drumWrap.classList.remove('shaking');
      stopScroll();
      document.getElementById('scrollPrize').textContent = '—';

      const prize = pickPrize();

      // Save to Supabase
      try {
        const { ok, status, data } = await dbFetch('/rest/v1/draw_records', {
          method: 'POST',
          body: JSON.stringify({
            serial_number: verifiedSerial,
            prize_id:      prize.id,
            prize_name:    prize.name,
            prize_tier:    prize.tier,
            prize_emoji:   prize.emoji,
          }),
        });

        if (!ok && status === 409) {
          // Conflict — this serial already drew (race condition guard)
          const { data: existing } = await dbFetch(
            `/rest/v1/draw_records?serial_number=eq.${encodeURIComponent(verifiedSerial)}&select=*`
          );
          if (existing && existing.length > 0) {
            const r = existing[0];
            const existPrize = PRIZES.find(p => p.id === r.prize_id) || PRIZES[PRIZES.length - 1];
            showAlreadyDrawn(r);
            setTimeout(() => showResult(existPrize, verifiedSerial), 200);
          }
          return;
        }
      } catch(e) {
        // If save fails, still show result (localStorage backup)
        console.error('Save error:', e);
      }

      showAlreadyDrawn({ serial_number: verifiedSerial, prize_name: prize.name, prize_tier: prize.tier, prize_emoji: prize.emoji, prize_id: prize.id });
      setTimeout(() => showResult(prize, verifiedSerial), 300);

    }, shakeDuration);
  }

  // Allow pressing Enter in the serial input
  document.getElementById('serialInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') verifySerial();
  });
</script>
</body>
</html>
